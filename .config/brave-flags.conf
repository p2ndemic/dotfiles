--password-store=basic
--disk-cache-dir=/tmp/brave_cache

--ozone-platform=wayland
--ozone-platform-hint=wayland
--gtk-version=4

--use-cmd-decoder=passthrough
--disable-gpu-sandbox

--enable-features=AcceleratedVideoEncoder,AcceleratedVideoDecodeLinuxGL,AcceleratedVideoDecodeLinuxZeroCopyGL,VaapiIgnoreDriverChecks,UseOutOfProcessVideoDecoding,HeavyAdPrivacyMitigations,V8VmFuture,ParallelDownloading,TouchpadOverscrollHistoryNavigation,WebRtcPipeWireCamera

--ignore-gpu-blocklist
--disable-gpu-driver-bug-workarounds
--enable-unsafe-webgpu
--disable-webgl

--enable-gpu-rasterization
--enable-native-gpu-memory-buffers
--enable-zero-copy

--enable-quic
--enable-experimental-web-platform-features
--enable-experimental-webassembly-features
--javascript-harmony
--v8-cache-options=code

--disable-sync
--disable-crash-reporter
--disable-domain-reliability
--no-default-browser-check
--no-pings

--disable-smooth-scrolling
