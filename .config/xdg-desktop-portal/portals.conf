# ══════════════════════════════════════════════════
#    XDG Desktop Portal
# ══════════════════════════════════════════════════
# Ref: https://wiki.archlinux.org/title/XDG_Desktop_Portal
# Ref: https://github.com/emersion/xdg-desktop-portal-wlr?tab=readme-ov-file#running
# Ref: https://github.com/emersion/xdg-desktop-portal-wlr/wiki/FAQ
# Ref: https://github.com/emersion/xdg-desktop-portal-wlr/wiki/Screencast-Compatibility
# Ref: https://docs.voidlinux.org/config/graphical-session/portals.html
# Ref: https://wiki.gentoo.org/wiki/XDG/xdg-desktop-portal
# Ref: https://flatpak.github.io/xdg-desktop-portal/
# Ref: https://man.archlinux.org/man/xdg-desktop-portal-wlr.5
# Ref: https://man.archlinux.org/man/portals.conf.5
# Ref: https://github.com/labwc/labwc/tree/master/data
# ══════════════════════════════════════════════════

[preferred]
default=gtk;wlr;
org.freedesktop.impl.portal.Screencast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.Inhibit=none
# ─── LXQt-specific portals ───
#org.freedesktop.impl.portal.Access=lxqt
#org.freedesktop.impl.portal.FileChooser=lxqt
# ─── Theme support (uncomment if using darkman) ───
#org.freedesktop.impl.portal.Settings=darkman

[screencast]
#output_name=eDP-1
max_fps=60
#exec_before=disable_notifications.sh
#exec_after=enable_notifications.sh
#chooser_type=simple
#chooser_cmd=slurp -f %o -or

# ──────────────────────────────────────────────────
# Default setup:
#   GTK portal → General desktop integration
#   WLR portal → Wayland screencast/screenshot support
#
# If you want to switch from GTK to LXQt portals:
#
#   1. Change:
#        default=wlr;lxqt;
#
#   2. Enable LXQt-specific portals below:
#        org.freedesktop.impl.portal.Access=lxqt
#        org.freedesktop.impl.portal.FileChooser=lxqt
#
#   3. (Optional) Create a drop-in to fix its Qt theme:
#
#        mkdir -p ~/.config/systemd/user/xdg-desktop-portal-lxqt.service.d/
#        nano ~/.config/systemd/user/xdg-desktop-portal-lxqt.service.d/override.conf
#
#        [Service]
#        Environment="QT_QPA_PLATFORMTHEME=qt6ct"
# ──────────────────────────────────────────────────
