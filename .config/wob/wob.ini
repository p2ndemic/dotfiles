# ──────────────────────────────────────────────────
# ~/.config/wob/wob.ini
# ──────────────────────────────────────────────────
# Ref: https://github.com/francma/wob
# ──────────────────────────────────────────────────
# Run `wob -vv` to inspect compiled-in defaults
# ──────────────────────────────────────────────────
# Reload config:
# systemctl --user daemon-reload && systemctl --user stop wob.service wob.socket && rm -f "$XDG_RUNTIME_DIR/wob.sock" && systemctl --user reset-failed && systemctl --user start wob.socket
# ──────────────────────────────────────────────────
width = 330
height = 35
anchor = bottom right
overflow_bar_color = CC3333FF

# ── Styles ────────────────────────────────────────
# [sink|source] muted: echo "0 muted" > $WOB_SOCK → → → red bar
# ──────────────────────────────────────────────────
[style.muted]
bar_color = CC3333FF
border_color = CC3333FF
