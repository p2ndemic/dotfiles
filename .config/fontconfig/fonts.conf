<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

 <!-- ============================================================
      РЕНДЕРИНГ
      ============================================================ -->

 <!-- Сглаживание контуров глифов. Отключать смысла нет даже на
      HiDPI — grayscale-антиалиасинг работает чисто и без
      артефактов при любой плотности пикселей. -->
 <edit mode="assign" name="antialias">
  <bool>true</bool>
 </edit>

 <!-- Встроенные растровые глифы (bitmap strikes) — пережиток
      экранов с низким DPI. На HiDPI они отображаются размытыми
      или ступенчатыми, поэтому отключаем принудительно. -->
 <edit mode="assign" name="embeddedbitmap">
  <bool>false</bool>
 </edit>

 <!-- Хинтинг подгоняет контуры глифов к пиксельной сетке.
      При Scale 2 (189 PPI физических) пикселей достаточно для
      точной передачи формы — хинтинг только искажает геометрию
      без какой-либо видимой пользы. Отключаем. -->
 <edit mode="assign" name="hinting">
  <bool>false</bool>
 </edit>

 <!-- LCD-фильтр подавляет цветовые бахромы при субпиксельном
      рендеринге. Поскольку субпиксельный рендеринг отключён
      (rgba=none ниже), фильтр не нужен. -->
 <edit mode="assign" name="lcdfilter">
  <const>lcdnone</const>
 </edit>

 <!-- Субпиксельный рендеринг (R-G-B) утраивал горизонтальное
      разрешение на экранах с низким DPI. На HiDPI с Scale 2
      субпиксели слишком мелкие — этот режим даёт цветовые
      артефакты без прироста чёткости. Используем чистый
      grayscale-антиалиасинг. -->
 <edit mode="assign" name="rgba">
  <const>none</const>
 </edit>

 <!-- ============================================================
      ПСЕВДОНИМЫ ШРИФТОВ
      ============================================================ -->

 <alias>
  <family>serif</family>
  <prefer>
   <family>IBM Plex Sans</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>

 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>IBM Plex Sans</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>

 <alias>
  <family>monospace</family>
  <prefer>
   <family>IBM Plex Mono</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>

 <alias>
  <family>courier</family>
  <prefer>
   <family>IBM Plex Mono</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>

</fontconfig>
