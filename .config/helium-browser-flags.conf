# ── Platform ───────────────────────────────────
--ozone-platform=wayland
--ozone-platform-hint=wayland
--gtk-version=4

# ── Storage & Cache ────────────────────────────
--password-store=basic
--disk-cache-dir=/tmp/helium-cache

# ── GPU Backend & Sandbox ──────────────────────
--use-cmd-decoder=passthrough
--disable-gpu-sandbox

# ── Browser Features ───────────────────────────
--enable-features=AcceleratedVideoEncoder,AcceleratedVideoDecodeLinuxGL,AcceleratedVideoDecodeLinuxZeroCopyGL,VaapiIgnoreDriverChecks,UseOutOfProcessVideoDecoding,HeavyAdPrivacyMitigations,V8VmFuture,ParallelDownloading,TouchpadOverscrollHistoryNavigation,WebRtcPipeWireCamera,WebContentsForceDark:inversion_method/cielab_based/image_behavior/none/foreground_lightness_threshold/150/background_lightness_threshold/205

# ── GPU Blocklist ──────────────────────────────
--ignore-gpu-blocklist
--disable-gpu-driver-bug-workarounds

# ── GPU Optimizations ──────────────────────────
--enable-gpu-rasterization
--enable-native-gpu-memory-buffers
--enable-zero-copy

# ── WebGL / WebGPU ─────────────────────────────
--enable-unsafe-webgpu
--enable-webgpu-developer-features
--disable-webgl

# ── Experimental Web Features ──────────────────
--enable-experimental-web-platform-features
--enable-experimental-webassembly-features

# ── Network & JS Features ──────────────────────
--enable-quic
--javascript-harmony
--v8-cache-options=code

# ── UI / UX ────────────────────────────────────
--force-dark-mode
--disable-smooth-scrolling

# ── Privacy / Misc ─────────────────────────────
--no-default-browser-check
--no-pings
--disable-crash-reporter
--disable-sync
