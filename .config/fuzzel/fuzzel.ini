# ╔════════════════════════════════════════════════════════════════════╗
# ║                        fuzzel configuration                        ║
# ║                     ~/.config/fuzzel/fuzzel.ini                    ║
# ╚════════════════════════════════════════════════════════════════════╝
# ──────────────────────────────────
# Ref: https://mark.stosberg.com/fuzzel-1-13-adds-new-features-for-menu-building-and-usability/
# Ref: https://mark.stosberg.com/fuzzel-a-great-dmenu-and-rofi-altenrative-for-wayland/
# Ref: https://codeberg.org/dnkl/fuzzel/pulls/645?ref=mark.stosberg.com
# Ref: https://github.com/catppuccin/fuzzel
# ──────────────────────────────────


# ══════════════════════════════════════════════════════════════════════
#  MAIN
# ══════════════════════════════════════════════════════════════════════
[main]

# ── Imports ───────────────────────────────────────────────────────────
# include=~/.config/fuzzel/colors.ini   # Подключить внешний конфиг (абсолютный путь или ~/)

# ── Display ───────────────────────────────────────────────────────────
# namespace=launcher          # Имя layer-shell поверхности (для блокировки в скринкастах)
# output=                     # Монитор для отображения, например DP-1 (по умолчанию выбирает compositor)

# ── Font ──────────────────────────────────────────────────────────────
# Шрифт в формате fontconfig: "Имя:свойство=значение".
# Несколько шрифтов через запятую — используются как fallback цепочка.
# Примеры (fc-match -s | sort):
#   font=Courier New:size=12
#   font=Dina:weight=bold:slant=italic
#   font=Noto Sans, DejaVu Sans:weight=bold, sans-serif
font=IBM Plex Mono:size=14
# use-bold=no                 # Разрешить жирный шрифт для выделенных элементов

# Масштабирование шрифта по DPI / scaling factor монитора.
# yes  — по DPI монитора (физический размер одинаков на всех мониторах)
# no   — по scaling factor (удвоение scale = удвоение размера)
# auto — по DPI если все мониторы имеют scale=1, иначе по scaling factor
dpi-aware=auto

# Гамма-корректный рендеринг в линейном цветовом пространстве.
# Светлые глифы на тёмном фоне выглядят толще, тёмные на светлом — тоньше.
# Использует 16-битные буферы. Недоступно в Cairo-сборках fuzzel.
# gamma-correct=no            # Гамма-коррекция в линейном цветовом пространстве (16-бит буфер)
# gamma-correct-blending=no

# ── Prompt ────────────────────────────────────────────────────────────
# placeholder=                # Текст-подсказка в пустом поле ввода
prompt="❯ "
# mesg=                       # Сообщение над строкой ввода, поддерживает переносы строк

# Поведение длинных строк в mesg.
# wrap   — перенос на следующую строку по границе слов
# expand — расширить окно по ширине самой длинной строки
mesg-mode=expand

# ── Icons ─────────────────────────────────────────────────────────────
# icon-theme=default
# icon-theme=MoreWaita | icon-theme=Numix | icon-theme=Numix-Circle | icon-theme=Numix-Adwaita | icon-theme=Numix-Adwaita-Light
# icons-enabled=yes

# ── Search & Matching ─────────────────────────────────────────────────
# hide-before-typing=no         # Скрыть список до первого символа ввода

# Поля .desktop-файлов для поиска (через запятую).
# Доступные: filename, name, generic, exec, categories, keywords, comment
# Default: #fields=filename,name,generic
fields=filename,name,generic,categories
# match-mode=fzf                # Режим поиска: fzf | exact (точное совпадение) | fuzzy (Левенштейн)
# sort-result=yes               # Сортировать результаты по частоте запуска и качеству совпадения
match-counter=yes

# Фильтровать .desktop-файлы по значению XDG_CURRENT_DESKTOP.
filter-desktop=yes
# show-actions=no               # Показывать действия из .desktop (например, "Новое окно")

# ── Applications ──────────────────────────────────────────────────────
# Команда для запуска терминальных приложений.
# {cmd} — плейсхолдер для подставляемой команды.
# Примеры:
#   terminal=foot -a '{cmd}' -T '{cmd}' {cmd}
#   terminal=foot -e {cmd}
terminal=foot -a '{cmd}' -T '{cmd}' {cmd}

# list-executables-in-path=no   # Добавить в список все исполняемые файлы из PATH

# ── Launch Prefix ───────────────────────────────────────────────:
# launch-prefix=systemd-run --user --scope --slice=app-graphical.slice --collect --no-block --quiet --
launch-prefix=uwsm app --

# password-character=*          # Символ маскировки при запуске с флагом --password

# ── Window Position ───────────────────────────────────────────────────
# anchor=center               # Позиция окна: center | top | bottom | left | right | top-left | top-right | bottom-left | bottom-right
# x-margin=0                  # Горизонтальный отступ от точки якоря в px (не работает с center/top/bottom)
# y-margin=0                  # Вертикальный отступ от точки якоря в px (не работает с center/left/right)

# ── Window Size ───────────────────────────────────────────────────────
# lines=15                    # Количество отображаемых строк совпадений
# hide-prompt=no              # Скрыть строку ввода (ввод всё равно работает)
# minimal-lines=no            # В dmenu-режиме: подстраивать высоту под реальное количество строк
# width=30                    # Ширина окна в символах (приблизительно для переменных шрифтов)

# ── Padding & Spacing ─────────────────────────────────────────────────
# tabs=8                      # Ширина таба в пробелах
# horizontal-pad=40           # Горизонтальный отступ между рамкой и контентом (px)
# vertical-pad=8              # Вертикальный отступ между рамкой и контентом (px)
# inner-pad=0                 # Отступ между строкой ввода и списком совпадений (px)
# line-height=                # Высота строки в px (по умолчанию берётся из метрик шрифта)
# letter-spacing=0            # Дополнительный межбуквенный интервал в px (допустимы отрицательные значения)

# ── Layer & Focus ─────────────────────────────────────────────────────
# layer=overlay               # Слой отрисовки: overlay (поверх fullscreen) | top (поверх обычных окон)
# keyboard-focus=exclusive    # Фокус клавиатуры: exclusive (захватить весь ввод) | on-demand (как обычное окно)
# exit-on-keyboard-focus-loss=yes # Закрыть fuzzel при потере фокуса клавиатуры

# ── Performance ───────────────────────────────────────────────────────
# render-workers=             # Потоков для рендеринга (по умолчанию = число логических CPU; 0 = без многопоточности)
# match-workers=              # Потоков для поиска (по умолчанию = число логических CPU; 0 = без многопоточности)

# Задержка перефильтрации (мс) при числе совпадений выше delayed-filter-limit.
# Реализует debounce: фильтрация запускается через N мс после последнего нажатия.
# Default: #delayed-filter-ms=300
delayed-filter-ms=200

# Порог переключения в режим отложенной фильтрации.
# При превышении — вместо мгновенной фильтрации используется debounce.
# Default: delayed-filter-limit=20000
delayed-filter-limit=5000

# Размер увеличенного превью иконки при малом числе совпадений.
# Доля от ширины окна (0.0–1.0). Значение 1 отключает превью.
# Default: #image-size-ratio=0.5
image-size-ratio=0.3

# Алгоритм масштабирования PNG-иконок при уменьшении.
# Скорость (убывает): none, nearest, bilinear → box, linear → cubic, lanczos2, lanczos3
# Качество (убывает): lanczos3-stretched, lanczos3, lanczos2, cubic → box, linear → ...
#scaling-filter=box

# ── Misc ──────────────────────────────────────────────────────────────
# cache=                      # Путь к кешу запусков (по умолчанию $XDG_CACHE_HOME/fuzzel; /dev/null = отключить)
# auto-select=no              # Автоматически выбрать единственный оставшийся вариант
# enable-mouse=yes            # Включить поддержку мыши


# ══════════════════════════════════════════════════════════════════════
#  COLORS  (формат RGBA hex, 8 символов, например fdf6e3ff)
# ══════════════════════════════════════════════════════════════════════
# [colors]

# ── Background ────────────────────────────────────────────────────────
# background=fdf6e3ff         # Фон окна

# ── Text ──────────────────────────────────────────────────────────────
# text=657b83ff               # Цвет обычного текста в списке
# message=657b83ff            # Цвет текста сообщения (mesg)
# prompt=586e75ff             # Цвет символа-промпта
# placeholder=93a1a1ff        # Цвет текста-подсказки в пустом поле
# input=657b83ff              # Цвет вводимого текста

# ── Match Highlight ───────────────────────────────────────────────────
# match=cb4b16ff              # Цвет совпадающей подстроки в невыделенной строке

# ── Selection ─────────────────────────────────────────────────────────
# selection=eee8d5ff          # Фон выделенной строки
# selection-text=586e75ff     # Цвет текста выделенной строки
# selection-match=cb4b16ff    # Цвет совпадающей подстроки в выделенной строке

# ── Misc ──────────────────────────────────────────────────────────────
# counter=93a1a1ff            # Цвет счётчика совпадений
# border=002b36ff             # Цвет рамки окна


# ──────────────────────────────────
# Сatppuccin Sky theme with background alpha 95% (f2) and Nord Frost (Dark) border color (#5e81acff)
# f2 = 95% | f7 = 97%
# ──────────────────────────────────
[colors]
background=1e1e2ef2
text=cdd6f4ff
message=cdd6f4ff
prompt=bac2deff
placeholder=7f849cff
input=cdd6f4ff
match=89dcebff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=89dcebff
counter=7f849cff
border=5e81acff


# ══════════════════════════════════════════════════════════════════════
#  BORDER
# ══════════════════════════════════════════════════════════════════════
# [border]
# width=1                     # Толщина рамки в пикселях
# radius=10                   # Скруглённость углов окна
# selection-radius=0          # Скруглённость углов выделенного элемента


# ══════════════════════════════════════════════════════════════════════
#  DMENU
# ══════════════════════════════════════════════════════════════════════
[dmenu]
mode=index
exit-immediately-if-empty=yes


# ══════════════════════════════════════════════════════════════════════
#  KEY BINDINGS
#  Формат:  action=Mod1+Mod2+key  (несколько комбинаций через пробел)
#  Shift:   клавиша должна быть строчной — Control+Shift+v, не Control+Shift+V
#  Alt:     обычно называется Mod1
#  Сброс:   action=none
# ══════════════════════════════════════════════════════════════════════
[key-bindings]

# ── App Control ───────────────────────────────────────────────────────
# cancel=Control+g Control+c Control+bracketleft Escape  # Выйти без запуска
# execute=Return KP_Enter Control+y                      # Запустить выбранное
# execute-or-next=Tab                                    # Запустить если одно совпадение, иначе — следующий
# execute-input=Shift+Return Shift+KP_Enter              # Запустить введённое как есть (игнорируя список)

# ── Cursor Movement ───────────────────────────────────────────────────
# cursor-left=Left Control+b                             # Курсор на символ влево
# cursor-left-word=Control+Left Mod1+b                   # Курсор на слово влево
# cursor-right=Right Control+f                           # Курсор на символ вправо
# cursor-right-word=Control+Right Mod1+f                 # Курсор на слово вправо
# cursor-home=Home Control+a                             # В начало строки ввода
# cursor-end=End Control+e                               # В конец строки ввода

# ── Deletion ──────────────────────────────────────────────────────────
# delete-line-backward=Control+u                         # Удалить всё до курсора
# delete-line-forward=Control+k                          # Удалить всё после курсора
# delete-line=Control+Shift+BackSpace                    # Очистить всё поле ввода
# delete-prev=BackSpace Control+h                        # Удалить символ до курсора
# delete-prev-word=Mod1+BackSpace Control+BackSpace Control+w  # Удалить слово до курсора
# delete-next=Delete                                     # Удалить символ после курсора
# delete-next-word=Mod1+d Control+Delete                 # Удалить слово после курсора

# ── Selection & Clipboard ─────────────────────────────────────────────
# insert-selected=Control+Tab                            # Вставить выбранный элемент в строку ввода
# expunge=Shift+Delete                                   # Удалить выбранный элемент из кеша запусков
# clipboard-paste=Control+v XF86Paste                    # Вставить из буфера обмена
# primary-paste=Shift+Insert Shift+KP_Insert             # Вставить из primary selection (средняя кнопка мыши)

# ── Navigation ────────────────────────────────────────────────────────
prev=Control+p
prev-with-wrap=Up ISO_Left_Tab
# prev-page=PageUp KP_PageUp                             # Предыдущая страница
next=Control+n
next-with-wrap=Down
# next-page=Page_Down KP_Page_Down                       # Следующая страница
# first=Control+Home                                     # Перейти к первому элементу
# last=Control+End                                       # Перейти к последнему элементу

# ── Custom Actions ────────────────────────────────────────────────────
# Запускают выбранный элемент и завершают fuzzel с кодом выхода 10–28.
# Используются в скриптах для определения, какое действие выбрал пользователь.
# custom-1=Mod1+1             # exit code 10
# custom-2=Mod1+2             # exit code 11
# custom-3=Mod1+3             # exit code 12
# custom-4=Mod1+4             # exit code 13
# custom-5=Mod1+5             # exit code 14
# custom-6=Mod1+6             # exit code 15
# custom-7=Mod1+7             # exit code 16
# custom-8=Mod1+8             # exit code 17
# custom-9=Mod1+9             # exit code 18
# custom-10=Mod1+10           # exit code 19
# custom-11=Mod1+11           # exit code 20
# custom-12=Mod1+12           # exit code 21
# custom-13=Mod1+13           # exit code 22
# custom-14=Mod1+14           # exit code 23
# custom-15=Mod1+15           # exit code 24
# custom-16=Mod1+16           # exit code 25
# custom-17=Mod1+17           # exit code 26
# custom-18=Mod1+18           # exit code 27
# custom-19=Mod1+19           # exit code 28
